name: Daily Field Note

on:
  schedule:
    - cron: "0 13 * * *"   # 7 AM MT daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  field-note:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # PAT so the push triggers deploy + tweet-on-publish
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Scrape (catch up)
        run: python scraper/scraper.py
      - name: Generate Field Note
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/field_note.py
      - name: Commit and push
        run: |
          git config user.name "itsalreadypriced-bot"
          git config user.email "actions@github.com"
          git add _field_notes/ scraper/articles.db
          if git diff --staged --quiet; then
            echo "Nothing high-signal today; no Field Note published."
          else
            git commit -m "Field Note $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
