name: Weekly Issue

on:
  schedule:
    - cron: "0 16 * * 0"   # 10 AM MT Sunday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Scrape (catch up)
        run: python scraper/scraper.py
      - name: Generate Issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/digest.py
      - name: Commit and push
        run: |
          git config user.name "itsalreadypriced-bot"
          git config user.email "actions@github.com"
          git add _posts/ scraper/articles.db scraper/issue_number.txt
          if git diff --staged --quiet; then
            echo "No Issue produced (no articles this week?)."
          else
            git commit -m "Weekly Issue $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
