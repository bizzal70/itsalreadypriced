name: Weekly RTFM

on:
  schedule:
    - cron: "0 15 * * 3"   # 9 AM MT Wednesday
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  rtfm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - name: Generate RTFM
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper/rtfm.py
      - name: Commit and push
        run: |
          git config user.name "itsalreadypriced-bot"
          git config user.email "actions@github.com"
          git add _rtfm/ scraper/rtfm_topics.yml
          if git diff --staged --quiet; then
            echo "No RTFM produced (topics exhausted?)."
          else
            git commit -m "RTFM $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
