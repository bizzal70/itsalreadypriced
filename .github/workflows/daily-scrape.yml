name: Daily Scrape

on:
  schedule:
    - cron: "0 12 * * *"   # 6 AM MT daily — build up the week's article pool
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "content"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt
      - run: pip install -r scraper/requirements.txt
      - run: python scraper/scraper.py
      - name: Commit article DB
        run: |
          git config user.name "itsalreadypriced-bot"
          git config user.email "actions@github.com"
          git add scraper/articles.db
          if git diff --staged --quiet; then
            echo "No new articles."
          else
            git commit -m "Scrape $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push
          fi
